# Nome da aplicação
spring.application.name=museu-virtual-hardware

# Configuração do MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/museu_virtual_hardware?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate - Criar tabelas automaticamente do seu DER
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logs detalhados para diagnosticar 500 em endpoints
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.hibernate.orm.jdbc=DEBUG
logging.level.com.fasterxml.jackson=DEBUG


# Seed de dados (import.sql)
# Garante que o import.sql rode mesmo com Hibernate/JPA e em ambientes MySQL
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.sql.init.platform=mysql
spring.sql.init.data-locations=classpath:import.sql
spring.sql.init.continue-on-error=false
spring.datasource.hikari.data-source-properties.useUnicode=true
spring.datasource.hikari.data-source-properties.characterEncoding=UTF-8

