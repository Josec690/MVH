# Nome da aplicação
spring.application.name=museu-virtual-hardware

# Configuração do Banco H2 (Em Memória)
spring.datasource.url=jdbc:h2:mem:db_museu
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console do H2 (Para você acessar pelo navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate - Criar tabelas automaticamente do seu DER
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true